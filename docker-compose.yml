services:
  backend:
    build:
      context: ./backend
    container_name: biogate-backend
    env_file:
      - ./backend/.env.example
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    container_name: biogate-postgres
    environment:
      POSTGRES_DB: biogate
      POSTGRES_USER: biogate
      POSTGRES_PASSWORD: biogate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: biogate-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
